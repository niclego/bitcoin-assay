name: Update LTH data

on:
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC — the thesis reads weekly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch LTH data and probe sources
        run: node scripts/fetch-lth.mjs
      - name: Commit if changed
        run: |
          git config user.name "assay-data-bot"
          git config user.email "actions@github.com"
          git add data/lth.json
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "data: weekly LTH snapshot"
            git push origin main
          fi
